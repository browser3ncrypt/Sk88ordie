<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SK88 OR DIE</title>
  <style>
    :root {
      --game-aspect: 900 / 320;   /* original ratio */
      --max-game-width: 92vw;
      --max-game-height: 75vh;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      background: #000;
      color: #0f0;
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
      touch-action: manipulation; /* better mobile touch */
    }

    #o {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      z-index: 999999;
      padding: 2vw;
    }

    #game-container {
      position: relative;
      width: min(var(--max-game-width), calc(var(--max-game-height) * var(--game-aspect)));
      height: min(var(--max-game-height), calc(var(--max-game-width) / var(--game-aspect)));
      max-width: 100%;
      max-height: 80vh;
      background: #000;
      image-rendering: pixelated;
      margin: 1vh auto;
    }

    canvas {
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      display: block;
    }

    #t, #s, #d, #h {
      position: absolute;
      z-index: 10;
      color: #0f0;
      text-shadow: 0 0 12px #0f0, 0 0 24px #000;
      pointer-events: none;
    }

    #t {
      top: 8vh;
      left: 0;
      right: 0;
      font-size: clamp(5vw, 9vw, 64px);
      text-align: center;
      animation: glow 2s infinite alternate;
    }

    #s {
      top: 2vw;
      left: 4vw;
      font-size: clamp(4vw, 6vw, 36px);
    }

    #d {
      top: 2vw;
      right: 4vw;
      font-size: clamp(4vw, 6vw, 36px);
      color: #ff0;
      animation: pulse 0.7s infinite;
    }

    #h {
      top: 10vh;
      left: 4vw;
      font-size: clamp(3.5vw, 5vw, 28px);
      opacity: 0.85;
    }

    #b {
      position: fixed;
      bottom: 8vh;
      left: 50%;
      transform: translateX(-50%);
      background: #c00;
      color: #fff;
      padding: 4vw 12vw;
      font-size: clamp(5vw, 8vw, 48px);
      border: none;
      border-radius: 16px;
      box-shadow: 0 0 40px #f00;
      animation: pulse 1s infinite;
      z-index: 99;
      cursor: pointer;
      touch-action: manipulation;
    }

    @keyframes glow {
      from { text-shadow: 0 0 20px #0f0; }
      to   { text-shadow: 0 0 80px #f00, 0 0 120px #f00; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.5; }
    }

    footer {
      position: fixed;
      bottom: 1vh;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 3vw;
      color: #444;
      z-index: 10;
      pointer-events: none;
    }

    @media (orientation: landscape) and (min-width: 900px) {
      #t { top: 12vh; }
      #h { top: 22vh; }
      #b { bottom: 12vh; padding: 1.5vh 6vw; font-size: 2.8vw; }
    }
  </style>
</head>
<body>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-HDXNR8D1Q5"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-HDXNR8D1Q5');
</script>

<div id="o">
  <div id="t">PRESS SPACE<br>OR TAP TO SKATE IN HELL</div>
  <div id="s">Score: 0</div>
  <div id="d">Doom in: 10</div>
  <div id="h">High Score: 0</div>
  <button id="b">TAP TO JUMP</button>

  <div id="game-container">
    <canvas id="c"></canvas>
  </div>
</div>

<audio id="bgm" loop preload="auto">
  <source src="https://bankcoin.loan/Rip%20It%Up(MP3_160K).mp3" type="audio/mpeg">
</audio>

<footer>© 2025 SK8ORDIE.COM — SKATE OR DIE™ is forever</footer>

<script>
(() => {
  const o    = document.getElementById('o');
  const c    = document.getElementById('c');
  const ctx  = c.getContext('2d');
  const t    = document.getElementById('t');
  const s    = document.getElementById('s');
  const d    = document.getElementById('d');
  const h    = document.getElementById('h');
  const b    = document.getElementById('b');
  const bgm  = document.getElementById('bgm');

  let running = false, score = 0;
  let highScore = localStorage.sk88high || 0;
  let py = 130, vel = 0, obs = [], f = 0, secs = 10;
  let unlocked = false;

  if (bgm) bgm.volume = 0.3;
  h.textContent = 'High Score: ' + highScore;

  // Dynamic canvas sizing
  function resize() {
    const cont = document.getElementById('game-container');
    const w = cont.clientWidth;
    const h = cont.clientHeight;
    c.width  = w;
    c.height = h;

    // Game logic constants scaled to current canvas size
    window.GROUND_Y   = h * 0.84;     // ~270/320
    window.PLAYER_Y   = h * 0.625;    // ~200/320
    window.JUMP_START = h * 0.406;    // ~130/320
    window.BAT_Y_HIGH = h * 0.25;     // ~80/320
    window.BAT_Y_LOW  = h * 0.656;    // ~210/320
    window.OB_W       = w * 0.089;    // ~80/900
    window.OB_H       = h * 0.312;    // ~100/320
    window.SPEED      = w * 0.0089;   // ~8/900
  }

  window.addEventListener('resize', resize);
  resize(); // initial

  // DOOM COUNTDOWN
  const countdownTimer = setInterval(() => {
    secs = Math.max(0, secs - 1);
    if (secs > 0) {
      d.textContent = `Doom in: ${secs}`;
      d.style.color = secs <= 3 ? '#f00' : '#ff0';
    } else {
      d.textContent = 'SKATE OR DIE!';
      d.style.color = '#f00';
      clearInterval(countdownTimer);
    }
  }, 1000);

  const resetDoom = () => {
    secs = 10;
    d.textContent = 'Doom in: 10';
    d.style.color = '#ff0';
  };

  ['mousemove', 'keydown', 'touchstart', 'click'].forEach(ev =>
    document.addEventListener(ev, resetDoom, {passive: true})
  );

  const playMusic = () => {
    if (bgm && bgm.paused && unlocked) bgm.play().catch(()=>{});
  };

  const JUMP = e => {
    if (e) e.preventDefault();
    unlocked = true;
    playMusic();
    resetDoom();

    if (!running) {
      t.style.display = 'none';
      b.style.display = 'block';
      running = true;
      requestAnimationFrame(loop);
    }

    if (py >= window.PLAYER_Y - 1) vel = -23 * (c.height / 320); // scale jump force
  };

  o.onclick = o.ontouchstart = JUMP;
  b.onclick = b.ontouchstart = JUMP;
  document.onkeydown = e => { if (e.code === 'Space') JUMP(e); };

  function drawGrimReaper(x, y) {
    const scale = c.width / 900;
    ctx.fillStyle = '#f00';   ctx.fillRect(x-15*scale, y+88*scale, 100*scale, 16*scale);
    ctx.fillStyle = '#fff';   ctx.fillRect(x-10*scale, y+92*scale, 20*scale, 6*scale);
                              ctx.fillRect(x+70*scale, y+92*scale, 20*scale, 6*scale);
    ctx.fillStyle = '#000';   ctx.fillRect(x, y, 80*scale, 100*scale);
    ctx.beginPath();
    ctx.moveTo(x+15*scale, y);
    ctx.lineTo(x+65*scale, y);
    ctx.lineTo(x+55*scale, y-30*scale);
    ctx.lineTo(x+25*scale, y-30*scale);
    ctx.closePath(); ctx.fill();

    ctx.fillStyle = '#0f0';
    ctx.fillRect(x+28*scale, y+12*scale, 8*scale, 8*scale);
    ctx.fillRect(x+48*scale, y+12*scale, 8*scale, 8*scale);

    ctx.strokeStyle = '#ccc'; ctx.lineWidth = 10*scale;
    ctx.beginPath();
    ctx.moveTo(x+80*scale, y+40*scale);
    ctx.lineTo(x+140*scale, y-60*scale);
    ctx.stroke();
  }

  function loop() {
    const w = c.width;
    const h = c.height;

    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#400'; ctx.fillRect(0, window.GROUND_Y, w, h - window.GROUND_Y);
    ctx.strokeStyle = '#0f0'; ctx.lineWidth = 14 * (w/900);
    ctx.beginPath(); ctx.moveTo(0, window.GROUND_Y); ctx.lineTo(w, window.GROUND_Y); ctx.stroke();

    vel += 0.8 * (h / 320);   // gravity scale
    py  += vel;

    if (py >= window.PLAYER_Y) { py = window.PLAYER_Y; vel = 0; }

    drawGrimReaper(w * 0.156, py);   // ~140/900

    if (f % 75 === 0) {
      obs.push({
        x: w + 20,
        y: Math.random() > 0.5 ? window.BAT_Y_HIGH : window.BAT_Y_LOW,
        bat: Math.random() > 0.5
      });
    }

    obs = obs.filter(ob => {
      ob.x -= window.SPEED;

      if (ob.bat) {
        ctx.fillStyle = '#ff0';
        ctx.beginPath();
        ctx.moveTo(ob.x, ob.y);
        ctx.lineTo(ob.x + 60*(w/900), ob.y + 50*(h/320));
        ctx.lineTo(ob.x, ob.y + 100*(h/320));
        ctx.lineTo(ob.x - 40*(w/900), ob.y + 50*(h/320));
        ctx.closePath(); ctx.fill();
      } else {
        ctx.fillStyle = '#888';
        ctx.fillRect(ob.x, window.PLAYER_Y, 80*(w/900), 100*(h/320));
        ctx.fillStyle = '#f00';
        ctx.font = `bold ${40*(w/900)}px monospace`;
        ctx.fillText('RIP', ob.x + 8*(w/900), window.PLAYER_Y + 55*(h/320));
      }

      // collision
      const hitZoneLeft  = w * 0.111;  // ~100/900
      const hitZoneRight = w * 0.289;  // ~260/900

      if (ob.x < hitZoneRight && ob.x > hitZoneLeft) {
        const playerHigh = py < window.PLAYER_Y * 0.8;
        if ((ob.bat && playerHigh) || (!ob.bat && !playerHigh)) {
          if (score > highScore) {
            highScore = score;
            localStorage.sk88high = highScore;
            h.textContent = 'High Score: ' + highScore + ' (NEW!)';
          }
          running = false;
          t.style.display = 'block';
          b.style.display = 'none';
          obs = []; f = 0; py = window.JUMP_START; vel = 0; score = 0;
          s.textContent = 'Score: 0';
          resetDoom();
          return false;
        }
      }

      return ob.x > -150;
    });

    score++;
    s.textContent = 'Score: ' + ~~(score / 10);

    f++;
    if (running) requestAnimationFrame(loop);
  }
})();
</script>

</body>
</html>
